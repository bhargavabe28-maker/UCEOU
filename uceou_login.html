<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAF ::: UNIVERSITY :::</title>
    <link rel="icon" type="image/png" href="https://uceou.in/eaf/student/images/logo.jpg">
    <link rel="stylesheet" href="login_style.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<body>
    <div id="lginBox" class="bg-login">
        <!-- Header -->
        <div class="head_bg">
            <div class="container-fluid">
                <div class="row" style="display: flex; align-items: center;">
                    <div class="col-xs-2 col-sm-1">
                        <img src="https://uceou.in/eaf/student/images/logo.jpg" id="img1" class="img-responsive" style="height: 60px; float: right;">
                    </div>
                    <div class="col-xs-10 col-sm-11">
                        <h4 style="margin: 0; padding-top: 15px; color: #fff; font-size: 20px; font-weight: 600;">University College of Engineering</h4>
                    </div>
                </div>
            </div>
        </div>

        <!-- Login Card -->
        <div class="container">
            <div class="row">
                <div class="col-md-3 col-lg-3 hidden-xs"></div>
                <div class="col-md-6 col-lg-6 col-xs-12">
                    <div class="login_bg">
                        <div class="row">
                            <div class="col-sm-4 col-xs-4 text-center">
                                <img src="https://uceou.in/eaf/student/images/bg-image/kk.png" class="img-responsive" style="margin-top: 55px; opacity: 0.6;" alt="Graduation Icon">
                            </div>
                            <div class="col-sm-8 col-xs-8">
                                <div class="loginpage_bg">
                                    <h3>Student Login</h3>
                                    <p><span class="example" style="color: #333; font-weight: bold; font-size: 12px;">(Enter HALLTICKET NO / ROLLNO)</span></p>
                                    
                                    <input type="text" id="txtUsername" class="form-control" placeholder="HALLTICKET NO / ROLLNO" style="margin-top: -5px; margin-bottom: 10px;">
                                    <input type="password" id="txtPassword" class="form-control" placeholder="Password" style="margin-bottom: 15px;">
                                    
                                    <div id="submit">
                                        <button type="button" id="btnSubmit" class="btn btn-block" style="background-color: #f0ad4e; color: #fff; font-weight: bold; padding: 10px; font-size: 18px; border-radius: 4px; box-shadow: 0 4px #cea052;">LOGIN</button>
                                        <div style="float: right; margin-top: 5px;">
                                            <a href="#" class="findpwd" style="color: #784303; font-size: 12px; font-weight: bold;"><u>Forgot Password</u></a>
                                        </div>
                                    </div>
                                    
                                    <div style="float: left; margin-top: 25px; width: 100%;">
                                        <a href="#" style="font-size: 20px; font-weight: 600; color: #163b69; text-decoration: underline; display: block; margin-bottom: 10px;">New User? Enroll Here</a>
                                        <a href="#" style="font-size: 20px; font-weight: 600; color: #163b69; text-decoration: underline;">Parent Login</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 col-lg-3 hidden-xs"></div>
            </div>
        </div>
    </div>

    <script src="login_script.js"></script>
</body>
</html>
